
services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: i2i-oracle-db
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle123
      APP_USER: bookuser
      APP_USER_PASSWORD: bookpass
    volumes:
      - oracle-data:/opt/oracle/oradata
    networks:
      - book-network
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: i2i-spring-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      SPRING_DATASOURCE_USERNAME: bookuser
      SPRING_DATASOURCE_PASSWORD: bookpass
    depends_on:
      oracle-db:
        condition: service_healthy
    networks:
      - book-network

networks:
  book-network:
    driver: bridge

volumes:
  oracle-data: