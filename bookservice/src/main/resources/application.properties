# Uygulama adi
spring.application.name=bookservice

# --- Oracle Veritabani Baglanti Ayarlari ---
# Docker'da calisan Oracle XE'ye baglaniyoruz (XEPDB1 pluggable database)
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=system
spring.datasource.password=oracle123
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# --- JPA / Hibernate Ayarlari ---
# Semayi Flyway yonettigi icin Hibernate'in tabloya dokunmasini kapatiyoruz
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=true

# --- Flyway Ayarlari ---
# Uygulama baslarken migration dosyalarini otomatik calistirir
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.oracle.sqlplus=true
spring.flyway.repair-on-migrate=true

# --- Swagger / OpenAPI ---
# Swagger arayuzunun adresi: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html